<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>С Днём Рождения 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh; /* Изменено с height на min-height */
      background: linear-gradient(135deg, #f5e6d3, #d2b48c);
      display: flex;
      flex-direction: column; /* Элементы будут друг под другом */
      justify-content: center;
      align-items: center;
      overflow-x: hidden; /* Запрещаем горизонтальный скролл */
      font-family: 'Montserrat', sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }

    .overlay {
      position: fixed; /* Чтобы всегда перекрывал фон */
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 248, 240, 0.3);
      z-index: 1;
      pointer-events: none; /* Чтобы не мешал кликать по фото */
    }

    .center-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(40px, 10vw, 64px); /* Адаптивный размер шрифта */
      color: #5a3e2b;
      text-align: center;
      z-index: 3;
      margin: 20px 0;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInText 2.5s ease forwards;
      text-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    @keyframes fadeInText {
      to { opacity: 1; transform: translateY(0); }
    }

    .photo {
      position: relative; /* На мобильных лучше relative, чтобы они шли в потоке */
      width: 80%; /* На мобильных шире */
      max-width: 250px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      z-index: 2;
    }

    /* Адаптация для компьютеров */
    @media (min-width: 768px) {
      .photo {
        position: absolute;
        width: 220px;
      }
      .left-img {
        left: 8%;
        top: 35%;
        transform: rotate(-12deg);
        animation: floatLeft 6s ease-in-out infinite;
      }
      .right-img {
        right: 8%;
        top: 65%;
        transform: rotate(12deg);
        animation: floatRight 6s ease-in-out infinite;
      }
    }

    /* Адаптация для мобильных */
    @media (max-width: 767px) {
      .left-img {
        transform: rotate(-5deg);
        margin-bottom: 20px;
        order: 1; /* Фото будет над текстом */
      }
      .center-text {
        order: 2; /* Текст посередине */
      }
      .right-img {
        transform: rotate(5deg);
        margin-top: 20px;
        order: 3; /* Фото под текстом */
      }
    }

    @keyframes floatLeft {
      0%, 100% { transform: rotate(-12deg) translateY(0); }
      50% { transform: rotate(-12deg) translateY(-10px); }
    }

    @keyframes floatRight {
      0%, 100% { transform: rotate(12deg) translateY(0); }
      50% { transform: rotate(12deg) translateY(-10px); }
    }

    .photo:hover {
      transform: scale(1.05) rotate(0deg) !important;
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <audio id="music" autoplay loop>
    <source src="dr26.mp3" type="audio/mpeg">
  </audio>

  <img src="left.jpg" class="photo left-img">
  <div class="center-text">С Днём Рождения 🤎</div>
  <img src="right.jpg" class="photo right-img">

  <script>
    document.addEventListener("click", function() {
      document.getElementById("music").play();
    });
  </script>

</body>
</html>
