<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>С Днём Рождения 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f5e6d3, #d2b48c);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 248, 240, 0.3);
      z-index: 1;
    }

    /* ✨ АНИМАЦИЯ ТЕКСТА */
    .center-text {
      font-family: 'Great Vibes', cursive;
      font-size: 64px;
      color: #5a3e2b;
      text-align: center;
      z-index: 2;

      opacity: 0;
      transform: translateY(30px);

      animation: fadeInText 2.5s ease forwards;
      text-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 📸 ОБЩИЙ СТИЛЬ ФОТО */
    .photo {
      position: absolute;
      width: 220px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);

      transition: transform 0.4s ease, box-shadow 0.4s ease;
      z-index: 2;
    }

    /* Левая */
    .left-img {
      left: 8%;
      top: 35%;
      transform: rotate(-12deg);

      animation: floatLeft 6s ease-in-out infinite;
    }

    /* Правая */
    .right-img {
      right: 8%;
      top: 65%;
      transform: rotate(12deg);

      animation: floatRight 6s ease-in-out infinite;
    }

    /* ✨ Лёгкое “плавание” */
    @keyframes floatLeft {
      0%, 100% { transform: rotate(-12deg) translateY(0); }
      50% { transform: rotate(-12deg) translateY(-10px); }
    }

    @keyframes floatRight {
      0%, 100% { transform: rotate(12deg) translateY(0); }
      50% { transform: rotate(12deg) translateY(-10px); }
    }

    /* 🔥 ЭФФЕКТ ПРИ НАВЕДЕНИИ */
    .photo:hover {
      transform: scale(1.05) rotate(0deg);
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <!-- Музыка -->
  <audio id="music" autoplay loop>
    <source src="dr26.mp3" type="audio/mpeg">
  </audio>

  <!-- Фото -->
  <img src="left.jpg" class="photo left-img">
  <img src="right.jpg" class="photo right-img">

  <!-- Текст -->
  <div class="center-text">
    С Днём Рождения 🤎
  </div>

  <script>
    document.addEventListener("click", function() {
      document.getElementById("music").play();
    });
  </script>

</body>
</html>
