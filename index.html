<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f5e6d3, #d2b48c);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 100vh;
    }

    /* ТЕКСТ */
    .center-text {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: #5a3e2b;
      text-align: center;

      opacity: 0;
      animation: fadeIn 2s ease forwards;

      text-shadow: 0 4px 15px rgba(0,0,0,0.15);
      z-index: 2;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    /* ОБЩИЕ ФОТО */
    .photo {
      position: absolute;
      width: 140px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: 0.4s;
    }

    /* ЛЕВАЯ */
    .left-img {
      top: 30%;
      left: 5%;
      transform: rotate(-10deg);
      animation: float1 5s ease-in-out infinite;
    }

    /* ПРАВАЯ */
    .right-img {
      bottom: 20%;
      right: 5%;
      transform: rotate(10deg);
      animation: float2 5s ease-in-out infinite;
    }

    @keyframes float1 {
      0%,100% { transform: rotate(-10deg) translateY(0); }
      50% { transform: rotate(-10deg) translateY(-8px); }
    }

    @keyframes float2 {
      0%,100% { transform: rotate(10deg) translateY(0); }
      50% { transform: rotate(10deg) translateY(-8px); }
    }

    /* НАЖАТИЕ (для телефона) */
    .photo:active {
      transform: scale(1.05) rotate(0deg);
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Музыка -->
    <audio id="music" loop>
      <source src="dr26.mp3" type="audio/mpeg">
    </audio>

    <!-- Фото -->
    <img src="left.jpg" class="photo left-img">
    <img src="right.jpg" class="photo right-img">

    <!-- Текст -->
    <div class="center-text">
      С Днём Рождения 
    </div>

  </div>

  <script>
    // запуск музыки по тапу (работает на телефонах)
    document.addEventListener("click", () => {
      document.getElementById("music").play();
    }, { once: true });
  </script>

</body>
</html>
